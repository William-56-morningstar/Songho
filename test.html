<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Tests Songho</title>
  <style>
    body { font-family: sans-serif; padding: 16px; }
    .ok { color: green; }
    .fail { color: red; }
  </style>
</head>
<body>
  <h2>Tests du moteur Songho</h2>
  <div id="results"></div>

  <script src="js/core/engine-full.js"></script>
  <script>
    const out = document.getElementById("results");

    function assert(label, condition) {
      const p = document.createElement("p");
      p.className = condition ? "ok" : "fail";
      p.textContent = (condition ? "✅ " : "❌ ") + label;
      out.appendChild(p);
    }

    function tryTest(label, fn) {
      try { fn(); }
      catch(e) {
        const p = document.createElement("p");
        p.className = "fail";
        p.textContent = "❌ ERREUR [" + label + "] : " + e.message;
        out.appendChild(p);
      }
    }

    tryTest("Etat initial", () => {
      const s = createGame();
      assert("Etat initial - total 70 graines", totalSeeds(s) === 70);
      assert("Etat initial - status playing", s.status === "playing");
      assert("Etat initial - 7 cases Nord", s.board.north.length === 7);
      assert("Etat initial - 7 cases Sud", s.board.south.length === 7);
    });

    tryTest("Semaille Sud", () => {
      const s = createGame("south");
      applyMove(s, { player: "south", pitIndex: 2 });
      assert("Semaille Sud S2 - case source vide", s.board.south[2] === 0);
      assert("Semaille Sud S2 - invariant 70", totalSeeds(s) === 70);
    });

    tryTest("Semaille Nord", () => {
      const s = createGame("north");
      applyMove(s, { player: "north", pitIndex: 4 });
      assert("Semaille Nord N4 - case source vide", s.board.north[4] === 0);
      assert("Semaille Nord N4 - invariant 70", totalSeeds(s) === 70);
    });

    tryTest("Grenier 14", () => {
      const s = createGame("south");
      s.board.south[3] = s.board.south[3] + 14 - s.board.south[0];
      s.board.south[0] = 0;
      assert("Grenier 14 - invariant avant", totalSeeds(s) === 70);
      applyMove(s, { player: "south", pitIndex: 3 });
      assert("Grenier 14 - case source vide", s.board.south[3] === 0);
      assert("Grenier 14 - score Sud augmente", s.scores.south >= 1);
      assert("Grenier 14 - invariant après", totalSeeds(s) === 70);
    });

    tryTest("Coup interdit", () => {
      const s = createGame("south");
      s.board.south = [1, 0, 0, 0, 0, 0, 0];
      s.board.north = [5, 5, 5, 5, 5, 5, 5];
      s.scores.north = 0;
      s.scores.south = 70 - 1 - 35;
      const legal = getLegalMoves(s);
      assert("Coup interdit S0=1", !legal.some(m => m.pitIndex === 0));
    });

    tryTest("10 coups invariant", () => {
      const s = createGame();
      for (let i = 0; i < 10; i++) {
        const moves = getLegalMoves(s);
        if (moves.length === 0 || s.status !== "playing") break;
        applyMove(s, moves[0]);
      }
      assert("10 coups - invariant 70", totalSeeds(s) === 70);
    });

    const total = out.querySelectorAll("p").length;
    const fails = out.querySelectorAll(".fail").length;
    const p = document.createElement("p");
    p.style.fontWeight = "bold";
    p.style.marginTop = "16px";
    p.textContent = `Résultat : ${total - fails}/${total} réussis`;
    out.appendChild(p);
  </script>
</body>
</html>
