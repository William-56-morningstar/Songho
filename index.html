<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Songho — Plateau Africain</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0602 0%, #1a1208 50%, #0e0a03 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      font-family: 'Segoe UI', 'Cinzel', 'Times New Roman', serif;
    }

    .game-container {
      background: radial-gradient(ellipse at 30% 40%, #2a1a0a, #0a0602);
      padding: 20px 25px 25px 25px;
      border-radius: 60px 60px 48px 48px;
      box-shadow: 
        0 20px 40px rgba(0,0,0,0.6),
        inset 0 1px 2px rgba(255,215,140,0.3),
        0 0 0 8px #3a2818,
        0 0 0 12px #5a3e20;
    }

    canvas {
      display: block;
      margin: 0 auto;
      border-radius: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 1px 4px rgba(255,200,100,0.2);
      cursor: pointer;
      transition: filter 0.2s;
    }

    canvas:active {
      filter: brightness(0.98);
    }

    .info-panel {
      margin-top: 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: linear-gradient(145deg, #2a1a0c, #1a0e05);
      border-radius: 20px;
      padding: 10px 18px;
      min-width: 110px;
      text-align: center;
      border: 1px solid #c9a03c;
      box-shadow: 0 5px 10px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,215,140,0.15);
      backdrop-filter: blur(2px);
    }

    .card-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #c9a03c;
      font-weight: 600;
    }

    .card-value {
      font-size: 28px;
      font-weight: bold;
      color: #f5e2a4;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      font-family: 'Cinzel', monospace;
    }

    .history-area {
      background: #130b04cc;
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 8px 15px;
      max-width: 280px;
      border-left: 4px solid #d4af37;
    }

    .history-title {
      font-size: 10px;
      color: #d4af37;
      letter-spacing: 1px;
    }

    #history-list {
      max-height: 70px;
      overflow-y: auto;
      font-size: 11px;
      color: #e0c080;
      margin-top: 5px;
    }

    .history-item {
      border-bottom: 1px solid #3a2818;
      padding: 3px 0;
    }

    button {
      background: linear-gradient(135deg, #d4a030, #8b5a2b);
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      color: #1f1404;
      font-weight: bold;
      cursor: pointer;
      font-family: 'Cinzel', serif;
      transition: 0.1s linear;
      box-shadow: 0 3px 6px black;
    }

    button:active {
      transform: scale(0.96);
    }

    @media (max-width: 700px) {
      .game-container { padding: 12px 16px; }
      .card-value { font-size: 22px; }
    }
  </style>
</head>
<body>
<div>
  <div class="game-container">
    <canvas id="gameCanvas" width="800" height="460" style="width:100%; height:auto; max-width:800px; aspect-ratio:800/460"></canvas>
    
    <div class="info-panel">
      <div class="card"><div class="card-label">⚔️ NORD</div><div class="card-value" id="score-nord">0</div></div>
      <div class="card"><div class="card-label">🎲 TOUR</div><div class="card-value" id="tour-joueur">Sud</div></div>
      <div class="card"><div class="card-label">🏆 SUD</div><div class="card-value" id="score-sud">0</div></div>
      <div class="history-area"><div class="history-title">📜 DERNIER COUP</div><div id="last-move-text">—</div>
      <div class="history-title" style="margin-top:6px">⏳ HISTORIQUE</div><div id="history-list"></div></div>
      <button id="btn-restart">✨ NOUVELLE PARTIE</button>
    </div>
  </div>
</div>

<script>
// ---------- MOTEUR COMPLET DU JEU SONGHO ----------
function createGame(startingPlayer = "south") {
  return {
    board: {
      north: [5,5,5,5,5,5,5],
      south: [5,5,5,5,5,5,5]
    },
    scores: { north: 0, south: 0 },
    currentPlayer: startingPlayer,
    status: "playing",
    winner: null,
    moveNumber: 1,
    lastSowPath: []
  };
}

function getLegalMoves(state) {
  if (state.status !== "playing") return [];
  const pits = state.board[state.currentPlayer];
  const moves = [];
  for (let i = 0; i < 7; i++) {
    if (pits[i] > 0) moves.push({ player: state.currentPlayer, pitIndex: i });
  }
  if (moves.length === 0) return [];
  return moves;
}

function applyMove(state, move) {
  if (state.status !== "playing") return { ok: false, reason: "Partie terminée" };
  if (move.player !== state.currentPlayer) return { ok: false, reason: "Pas ton tour" };
  if (state.board[move.player][move.pitIndex] === 0) return { ok: false, reason: "Trou vide" };

  let newState = JSON.parse(JSON.stringify(state));
  let seeds = newState.board[move.player][move.pitIndex];
  newState.board[move.player][move.pitIndex] = 0;
  let currentPlayer = move.player;
  let currentRow = move.player;
  let currentIdx = move.pitIndex;
  let lastPos = null;

  while (seeds > 0) {
    if (currentRow === move.player && currentIdx === move.pitIndex) {
      // on avance d'abord
      if (currentRow === "north") {
        if (currentIdx + 1 < 7) currentIdx++;
        else { currentRow = "south"; currentIdx = 0; }
      } else {
        if (currentIdx + 1 < 7) currentIdx++;
        else { currentRow = "north"; currentIdx = 0; }
      }
    } else {
      // semis normal
      newState.board[currentRow][currentIdx]++;
      seeds--;
      lastPos = { player: currentRow, pitIndex: currentIdx };
      if (seeds === 0) break;
      // avancer
      if (currentRow === "north") {
        if (currentIdx + 1 < 7) currentIdx++;
        else { currentRow = "south"; currentIdx = 0; }
      } else {
        if (currentIdx + 1 < 7) currentIdx++;
        else { currentRow = "north"; currentIdx = 0; }
      }
    }
  }

  let captured = 0;
  let captureOccurred = false;

  if (lastPos && lastPos.player === move.player && newState.board[lastPos.player][lastPos.pitIndex] === 1) {
    let oppRow = lastPos.player === "north" ? "south" : "north";
    let oppPit = lastPos.pitIndex;
    if (newState.board[oppRow][oppPit] > 0) {
      captured = newState.board[oppRow][oppPit];
      newState.scores[move.player] += captured + 1;
      newState.board[oppRow][oppPit] = 0;
      newState.board[lastPos.player][lastPos.pitIndex] = 0;
      captureOccurred = true;
    }
  }

  if (!captureOccurred && lastPos) {
    // pas de capture, la graine reste
  }

  // Vérifier fin de partie (tous les trous d'un joueur vides)
  const northEmpty = newState.board.north.every(v => v === 0);
  const southEmpty = newState.board.south.every(v => v === 0);
  if (northEmpty || southEmpty) {
    let remainingNorth = newState.board.north.reduce((a,b)=>a+b,0);
    let remainingSouth = newState.board.south.reduce((a,b)=>a+b,0);
    newState.scores.north += remainingNorth;
    newState.scores.south += remainingSouth;
    newState.board.north.fill(0);
    newState.board.south.fill(0);
    newState.status = "ended";
    if (newState.scores.north > newState.scores.south) newState.winner = "north";
    else if (newState.scores.south > newState.scores.north) newState.winner = "south";
    else newState.winner = "draw";
  } else {
    // changer de joueur
    newState.currentPlayer = newState.currentPlayer === "north" ? "south" : "north";
    // vérifier si nouveau joueur a des coups
    let nextMoves = getLegalMoves(newState);
    if (nextMoves.length === 0) {
      let remainingNorth = newState.board.north.reduce((a,b)=>a+b,0);
      let remainingSouth = newState.board.south.reduce((a,b)=>a+b,0);
      newState.scores.north += remainingNorth;
      newState.scores.south += remainingSouth;
      newState.board.north.fill(0);
      newState.board.south.fill(0);
      newState.status = "ended";
      if (newState.scores.north > newState.scores.south) newState.winner = "north";
      else if (newState.scores.south > newState.scores.north) newState.winner = "south";
      else newState.winner = "draw";
    }
  }
  newState.moveNumber++;
  return { ok: true, state: newState, action: { type: "move", captured } };
}

// ---------- RENDU PHOTOREALISTE BOIS + PIERRES ----------
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
let gameState = createGame("south");

// Dimensions dynamiques
let w = 800, h = 460;
canvas.width = w; canvas.height = h;

const pitsNorth = [];
const pitsSouth = [];

function computePositions() {
  const startX = 100;
  const endX = w - 100;
  const stepX = (endX - startX) / 6;
  const yNorth = h * 0.32;
  const ySouth = h * 0.68;
  pitsNorth.length = 0; pitsSouth.length = 0;
  for (let i = 0; i < 7; i++) {
    pitsNorth.push({ x: startX + i * stepX, y: yNorth, r: 32 });
    pitsSouth.push({ x: startX + i * stepX, y: ySouth, r: 32 });
  }
}

function drawWoodBase() {
  // fond plateau bois exotique
  const grad = ctx.createLinearGradient(0, 0, w, h);
  grad.addColorStop(0, '#5a3c1a');
  grad.addColorStop(0.3, '#3e2a12');
  grad.addColorStop(0.7, '#2a1c0c');
  grad.addColorStop(1, '#1f1408');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
  
  // texture bois (rayures)
  for (let i = 0; i < 60; i++) {
    ctx.beginPath();
    ctx.moveTo(10 + i*13, 0);
    ctx.lineTo(15 + i*11, h);
    ctx.strokeStyle = `rgba(0,0,0,${0.05 + (i%3)*0.02})`;
    ctx.lineWidth = 1.2;
    ctx.stroke();
  }
  // ourlet sculpté
  ctx.strokeStyle = '#e4bc6e';
  ctx.lineWidth = 5;
  ctx.strokeRect(12, 12, w-24, h-24);
  ctx.strokeStyle = '#aa7c3c';
  ctx.lineWidth = 2;
  ctx.strokeRect(18, 18, w-36, h-36);
}

function drawCavityReal(x, y, r, glow = false) {
  ctx.save();
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 3;
  ctx.shadowColor = "rgba(0,0,0,0.7)";
  const gradDark = ctx.createRadialGradient(x-5, y-4, 3, x, y, r);
  gradDark.addColorStop(0, '#201008');
  gradDark.addColorStop(0.7, '#0a0502');
  ctx.fillStyle = gradDark;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fill();
  // cercle relief bois clair
  ctx.shadowBlur = 2;
  ctx.beginPath();
  ctx.arc(x, y, r-2, 0, Math.PI*2);
  ctx.strokeStyle = '#c9a457';
  ctx.lineWidth = 2.5;
  ctx.stroke();
  if (glow) {
    ctx.beginPath();
    ctx.arc(x, y, r+2, 0, Math.PI*2);
    ctx.strokeStyle = '#ffdd99';
    ctx.lineWidth = 3;
    ctx.shadowBlur = 12;
    ctx.shadowColor = "#ffcc66";
    ctx.stroke();
  }
  ctx.restore();
}

function drawSeedGem(x, y, colorType = "gold") {
  ctx.save();
  ctx.shadowBlur = 6;
  ctx.shadowOffsetX = 1;
  ctx.shadowOffsetY = 1;
  let grad;
  if (colorType === "north") grad = ctx.createRadialGradient(x-3, y-3, 2, x, y, 8);
  else grad = ctx.createRadialGradient(x-3, y-3, 2, x, y, 8);
  if (colorType === "north") {
    grad.addColorStop(0, '#e0f0ff');
    grad.addColorStop(1, '#2f6f9f');
  } else if (colorType === "south") {
    grad.addColorStop(0, '#ffe0c0');
    grad.addColorStop(1, '#b84c1c');
  } else {
    grad.addColorStop(0, '#ffe6aa');
    grad.addColorStop(1, '#d48c2c');
  }
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.ellipse(x, y, 6, 7, 0, 0, Math.PI*2);
  ctx.fill();
  // reflet haut
  ctx.fillStyle = "rgba(255,250,210,0.7)";
  ctx.beginPath();
  ctx.ellipse(x-1.5, y-2, 2, 2.2, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawSeedsInPit(x, y, r, count, isNorthSide) {
  if (count === 0) return;
  const maxPerRing = 8;
  const radius = r * 0.55;
  for (let i = 0; i < Math.min(count, maxPerRing); i++) {
    let angle = (i / Math.min(count, maxPerRing)) * Math.PI * 2;
    let offX = Math.cos(angle) * radius;
    let offY = Math.sin(angle) * radius * 0.85;
    drawSeedGem(x + offX, y + offY - 2, isNorthSide ? "north" : "south");
  }
  if (count > maxPerRing) {
    for (let i = 0; i < count - maxPerRing && i < 6; i++) {
      let angle2 = (i / 5) * Math.PI * 2 + 0.8;
      let offX2 = Math.cos(angle2) * (radius*0.7);
      let offY2 = Math.sin(angle2) * (radius*0.6);
      drawSeedGem(x + offX2, y + offY2 + 1, isNorthSide ? "north" : "south");
    }
  }
  // badge num
  ctx.font = "bold 14px 'Cinzel'";
  ctx.fillStyle = "#f8e6b0";
  ctx.shadowBlur = 4;
  ctx.fillText(count, x+12, y-15);
}

function drawGreniers() {
  // grenier gauche (sud)
  ctx.fillStyle = "#1f1507";
  ctx.shadowBlur = 6;
  ctx.fillRect(28, h/2-45, 48, 90);
  ctx.fillStyle = "#ab7e42";
  ctx.font = "bold 22px Cinzel";
  ctx.fillText(gameState.scores.south, 34, h/2+10);
  ctx.fillStyle = "#ffbb77";
  ctx.font = "bold 14px sans-serif";
  ctx.fillText("SUD", 40, h/2-20);
  
  // grenier droit (nord)
  ctx.fillStyle = "#1f1507";
  ctx.fillRect(w-76, h/2-45, 48, 90);
  ctx.fillStyle = "#7cacdd";
  ctx.font = "bold 22px Cinzel";
  ctx.fillText(gameState.scores.north, w-70, h/2+10);
  ctx.fillStyle = "#cce6ff";
  ctx.font = "bold 14px";
  ctx.fillText("NORD", w-68, h/2-20);
  ctx.shadowBlur = 0;
}

function drawDecorations() {
  // motifs tribaux
  ctx.beginPath();
  for (let i=0;i<3;i++) {
    ctx.moveTo(70 + i*220, h-28);
    ctx.lineTo(95 + i*220, h-42);
    ctx.lineTo(120 + i*220, h-28);
    ctx.fillStyle = "#c48a3c";
    ctx.fill();
  }
  for (let i=0;i<3;i++) {
    ctx.beginPath();
    ctx.moveTo(70 + i*220, 28);
    ctx.lineTo(95 + i*220, 42);
    ctx.lineTo(120 + i*220, 28);
    ctx.fillStyle = "#c48a3c";
    ctx.fill();
  }
}

function drawFull() {
  if (!ctx) return;
  drawWoodBase();
  computePositions();
  const legalMoves = getLegalMoves(gameState);
  const legalIdx = legalMoves.map(m => m.pitIndex);
  
  for (let i=0;i<7;i++) {
    let isLegalNorth = (gameState.currentPlayer === "north" && legalIdx.includes(i));
    let isLegalSouth = (gameState.currentPlayer === "south" && legalIdx.includes(i));
    drawCavityReal(pitsNorth[i].x, pitsNorth[i].y, pitsNorth[i].r, isLegalNorth);
    drawCavityReal(pitsSouth[i].x, pitsSouth[i].y, pitsSouth[i].r, isLegalSouth);
    let countNorth = gameState.board.north[i];
    let countSouth = gameState.board.south[i];
    drawSeedsInPit(pitsNorth[i].x, pitsNorth[i].y, pitsNorth[i].r, countNorth, true);
    drawSeedsInPit(pitsSouth[i].x, pitsSouth[i].y, pitsSouth[i].r, countSouth, false);
  }
  drawGreniers();
  drawDecorations();
  
  // Vignette centrale
  ctx.font = "italic 16px 'Cinzel'";
  ctx.fillStyle = "#eedd99";
  ctx.shadowBlur = 2;
  ctx.fillText("⚡ SONGHO ⚡", w/2-60, h-18);
  ctx.fillStyle = "#ba8b3a";
  ctx.fillText("●", w/2-12, h-27);
}

// Interaction
canvas.addEventListener("click", (e) => {
  if (gameState.status !== "playing") return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  let mouseX = (e.clientX - rect.left) * scaleX;
  let mouseY = (e.clientY - rect.top) * scaleY;
  const legal = getLegalMoves(gameState);
  const player = gameState.currentPlayer;
  const pitsArray = player === "north" ? pitsNorth : pitsSouth;
  for (let idx=0; idx<7; idx++) {
    if (!legal.some(m => m.pitIndex === idx)) continue;
    const p = pitsArray[idx];
    const dx = mouseX - p.x;
    const dy = mouseY - p.y;
    if (Math.hypot(dx, dy) <= p.r + 8) {
      const result = applyMove(gameState, { player, pitIndex: idx });
      if (result.ok) {
        gameState = result.state;
        let desc = `${player === "north" ? "Nord" : "Sud"} joue ${player==="north"?"N":"S"}${idx+1}, capture ${result.action.captured || 0}`;
        document.getElementById("last-move-text").innerHTML = desc;
        const histDiv = document.getElementById("history-list");
        const newHist = document.createElement("div");
        newHist.className = "history-item";
        newHist.innerText = gameState.moveNumber-1 + ". " + desc;
        histDiv.prepend(newHist);
        if (histDiv.children.length > 7) histDiv.removeChild(histDiv.lastChild);
        document.getElementById("score-nord").innerText = gameState.scores.north;
        document.getElementById("score-sud").innerText = gameState.scores.south;
        document.getElementById("tour-joueur").innerText = gameState.currentPlayer === "north" ? "Nord" : "Sud";
        drawFull();
        if (gameState.status === "ended") {
          setTimeout(() => alert(gameState.winner === "draw" ? "Égalité !" : (gameState.winner === "north" ? "🏆 Victoire NORD 🏆" : "🏆 Victoire SUD 🏆")), 50);
        }
      }
      break;
    }
  }
});

document.getElementById("btn-restart").onclick = () => {
  gameState = createGame("south");
  document.getElementById("history-list").innerHTML = "";
  document.getElementById("last-move-text").innerHTML = "—";
  document.getElementById("score-nord").innerText = "0";
  document.getElementById("score-sud").innerText = "0";
  document.getElementById("tour-joueur").innerText = "Sud";
  drawFull();
};

drawFull();
</script>
</body>
</html>
