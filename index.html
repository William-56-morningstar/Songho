<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Awélé - Jeu de semis</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: #1a472a;
            background-image: radial-gradient(circle at 20% 30%, rgba(60, 100, 45, 0.4) 2%, transparent 2.5%),
                              radial-gradient(circle at 80% 70%, rgba(50, 90, 40, 0.3) 1.5%, transparent 2%);
            background-size: 55px 55px, 70px 70px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Roboto', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Conteneur principal */
        .game-container {
            max-width: 1300px;
            width: 100%;
            background: #faf3e0;
            background: linear-gradient(145deg, #fff8ec, #f5ebd4);
            border-radius: 60px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 3px rgba(255, 255, 255, 0.8);
            padding: 22px 28px 28px 28px;
            transition: all 0.2s;
        }

        /* En-tête */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #d8c99e;
            padding-bottom: 14px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .connexion {
            font-family: 'Courier New', monospace;
            font-weight: 800;
            font-size: 1.15rem;
            letter-spacing: 2px;
            background: #1e2f1a;
            display: inline-block;
            padding: 6px 20px;
            border-radius: 40px;
            color: #e9dba9;
            box-shadow: inset 0 -1px 0 #4a6040, 0 2px 8px rgba(0,0,0,0.15);
        }
        .connexion small {
            font-size: 0.65rem;
            display: block;
            letter-spacing: 1px;
        }
        .info-links {
            display: flex;
            gap: 28px;
            font-weight: 600;
            color: #6b4c2c;
            font-size: 0.95rem;
        }
        .info-links span {
            cursor: default;
            border-right: 1px solid #ccb988;
            padding-right: 26px;
        }
        .info-links span:last-child {
            border-right: none;
        }
        .licence {
            font-size: 0.7rem;
            background: #e6dbbc;
            padding: 5px 14px;
            border-radius: 30px;
            font-weight: 600;
            color: #4a351a;
            text-align: center;
            line-height: 1.3;
        }

        /* Layout principal */
        .main-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
            justify-content: center;
        }

        /* Zone plateau */
        .board-area {
            flex: 3;
            min-width: 500px;
            background: #c9a15b;
            background: radial-gradient(ellipse at 30% 35%, #e0bd7c, #b8883a);
            border-radius: 100px;
            padding: 28px 18px 22px 18px;
            box-shadow: inset 0 0 0 5px #fdf0cf, inset 0 0 0 12px #a57130, 0 12px 28px rgba(0,0,0,0.35);
        }

        .awale-board {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .row {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .pit {
            width: 82px;
            height: 82px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 2rem;
            font-family: 'Courier New', monospace;
            color: #2e1e0c;
            transition: all 0.1s ease;
            cursor: pointer;
            background: radial-gradient(circle at 30% 35%, #fcf3cf, #e9d69a);
            box-shadow: inset 0 -5px 0 #9b6e3c, 0 8px 14px rgba(0,0,0,0.25);
            position: relative;
            border: 1px solid #ffefb5;
        }

        .pit.highlight {
            box-shadow: 0 0 0 4px #ffdd77, 0 0 0 9px #ffa847, inset 0 -3px 0 #a56b2f;
            transform: scale(1.02);
            background: radial-gradient(circle at 30% 35%, #fff5cf, #f7e2a4);
        }

        .pit.disabled {
            opacity: 0.55;
            filter: grayscale(0.15);
            cursor: not-allowed;
        }

        /* Greniers */
        .granaries {
            display: flex;
            justify-content: space-between;
            margin: 20px 35px 0 35px;
            gap: 35px;
        }
        .granary {
            background: #9c6e3e;
            background: linear-gradient(145deg, #b07d48, #845a2c);
            padding: 8px 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.9rem;
            font-family: monospace;
            color: #faf0c5;
            text-align: center;
            box-shadow: inset 0 1px 4px #efc48c, 0 6px 12px rgba(0,0,0,0.25);
            min-width: 140px;
        }
        .granary span:first-child {
            font-size: 0.8rem;
            display: block;
            font-weight: 500;
            letter-spacing: 2px;
            color: #ffefb8;
        }

        /* Panneau de tour */
        .turn-panel {
            background: #2d2113d0;
            backdrop-filter: blur(6px);
            margin-top: 22px;
            padding: 10px 18px;
            border-radius: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            font-weight: bold;
            color: #fbefcf;
        }
        .turn-indicator {
            background: #1e2f12;
            padding: 6px 24px;
            border-radius: 3rem;
            font-size: 1rem;
        }
        .last-move {
            background: #4a341c;
            padding: 5px 20px;
            border-radius: 2rem;
            font-size: 0.85rem;
        }
        .message {
            background: #e9bc6d;
            color: #2c1b0a;
            padding: 5px 18px;
            border-radius: 2rem;
            font-weight: 600;
        }
        button {
            background: #8f673b;
            border: none;
            font-weight: bold;
            padding: 6px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-family: inherit;
            transition: 0.08s linear;
            box-shadow: 0 2px 5px black;
        }
        button:active {
            transform: scale(0.96);
        }

        /* Historique */
        .history-area {
            flex: 1.2;
            min-width: 260px;
            background: #f7efdb;
            border-radius: 48px;
            padding: 22px 18px;
            box-shadow: inset 0 0 0 2px #fffef5, 0 8px 22px rgba(0,0,0,0.2);
        }
        .history-header {
            font-weight: 800;
            font-size: 1.4rem;
            border-left: 5px solid #b87a3a;
            padding-left: 14px;
            margin-bottom: 20px;
            color: #3a2a1a;
        }
        .last-coup {
            background: #e6dbbc;
            border-radius: 28px;
            padding: 12px 18px;
            margin-bottom: 28px;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: inset 0 0 0 1px #fff3dc, 0 3px 8px #0000001a;
        }
        .last-coup p {
            margin: 6px 0;
        }
        .history-list {
            max-height: 360px;
            overflow-y: auto;
            font-size: 0.8rem;
            font-family: monospace;
            background: #e7ddc0;
            border-radius: 24px;
            padding: 10px 14px;
        }
        .history-list div {
            padding: 6px 0;
            border-bottom: 1px dashed #c2ae7a;
            font-weight: 500;
        }

        @media (max-width: 900px) {
            .pit {
                width: 60px;
                height: 60px;
                font-size: 1.5rem;
            }
            .board-area {
                min-width: 360px;
            }
            .granary {
                min-width: 100px;
                font-size: 1.4rem;
            }
            .game-container {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-header">
        <div class="connexion"># CONNEXION<br><small>Connecte</small></div>
        <div class="info-links">
            <span>Règles</span>
            <span>Prise</span>
            <span>Quitter</span>
        </div>
        <div class="licence">NYUMA PENA DE<br>MANIFESTATION DE<br>LICENCE 2 - C</div>
    </div>

    <div class="main-layout">
        <div class="board-area">
            <div class="awale-board">
                <div class="row row-nord" id="nord-row"></div>
                <div class="row row-sud" id="sud-row"></div>
            </div>
            <div class="granaries">
                <div class="granary"><span>NORD</span> <span id="north-store">0</span></div>
                <div class="granary"><span>SUD</span> <span id="south-store">0</span></div>
            </div>
            <div class="turn-panel">
                <div class="turn-indicator" id="turn-indicator">TOUR : SUD</div>
                <div class="last-move" id="last-move-label">DERNIER COUP : —</div>
                <div class="message" id="game-message">A vous de jouer</div>
                <button id="reset-game">⟳ Nouvelle partie</button>
            </div>
        </div>

        <div class="history-area">
            <div class="history-header">HISTORIQUE</div>
            <div class="last-coup">
                <p><strong>⚫ DERNIER COUP</strong><br><span id="last-coup-detail">Nord joue —</span><br><span id="last-catch">aucune capture</span></p>
            </div>
            <div class="history-list" id="history-list">
                <div style="color:#7a6233;">Liste des tours</div>
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- MOTEUR COMPLET AWÉLÉ ----------
    let board = [4,4,4,4,4,4, 4,4,4,4,4,4];
    let northStore = 0;
    let southStore = 0;
    let currentPlayer = "sud";
    let gameOver = false;
    let winner = null;
    let historyMoves = [];

    // DOM refs
    const nordRow = document.getElementById("nord-row");
    const sudRow = document.getElementById("sud-row");
    const northStoreSpan = document.getElementById("north-store");
    const southStoreSpan = document.getElementById("south-store");
    const turnIndicator = document.getElementById("turn-indicator");
    const lastMoveLabel = document.getElementById("last-move-label");
    const gameMessage = document.getElementById("game-message");
    const lastCoupDetail = document.getElementById("last-coup-detail");
    const lastCatchSpan = document.getElementById("last-catch");
    const historyListDiv = document.getElementById("history-list");
    const resetBtn = document.getElementById("reset-game");

    function isNordCase(idx) { return idx >= 0 && idx <= 5; }
    function getCaseOwner(idx) { return isNordCase(idx) ? "nord" : "sud"; }
    function nordIdxToGlobal(pos) { return pos; }
    function sudIdxToGlobal(pos) { return 6 + pos; }

    // Vérifie si un joueur a au moins un coup nourrissant (qui capture >= 1)
    function hasFeedingMove(player) {
        for (let i = 0; i < 6; i++) {
            let globalIdx = (player === "nord") ? nordIdxToGlobal(i) : sudIdxToGlobal(i);
            if (board[globalIdx] === 0) continue;
            let seeds = board[globalIdx];
            let tempBoard = [...board];
            let idx = globalIdx;
            let s = seeds;
            tempBoard[idx] = 0;
            let current = idx;
            while (s > 0) {
                current = (current + 1) % 12;
                tempBoard[current]++;
                s--;
            }
            let lastPit = current;
            let lastOwner = getCaseOwner(lastPit);
            let captured = 0;
            if (lastOwner !== player && (tempBoard[lastPit] === 2 || tempBoard[lastPit] === 3)) {
                let captureIdx = lastPit;
                while (captureIdx >= 0 && getCaseOwner(captureIdx) !== player && (tempBoard[captureIdx] === 2 || tempBoard[captureIdx] === 3)) {
                    captured += tempBoard[captureIdx];
                    captureIdx--;
                    if (captureIdx < 0 || getCaseOwner(captureIdx) === player) break;
                }
            }
            if (captured > 0) return true;
        }
        return false;
    }

    // Simulation pour un coup précis
    function simulateCapture(player, pitLocalIdx) {
        let globalIdx = (player === "nord") ? nordIdxToGlobal(pitLocalIdx) : sudIdxToGlobal(pitLocalIdx);
        let seeds = board[globalIdx];
        if (seeds === 0) return 0;
        let tempBoard = [...board];
        let idx = globalIdx;
        let s = seeds;
        tempBoard[idx] = 0;
        let current = idx;
        while (s > 0) {
            current = (current + 1) % 12;
            tempBoard[current]++;
            s--;
        }
        let lastPit = current;
        let lastOwner = getCaseOwner(lastPit);
        let captured = 0;
        if (lastOwner !== player && (tempBoard[lastPit] === 2 || tempBoard[lastPit] === 3)) {
            let captureIdx = lastPit;
            while (captureIdx >= 0 && getCaseOwner(captureIdx) !== player && (tempBoard[captureIdx] === 2 || tempBoard[captureIdx] === 3)) {
                captured += tempBoard[captureIdx];
                captureIdx--;
                if (captureIdx < 0 || getCaseOwner(captureIdx) === player) break;
            }
        }
        return captured;
    }

    function playMove(pitLocalIdx) {
        if (gameOver) {
            gameMessage.innerText = "Partie terminée !";
            return false;
        }
        let globalIdx = (currentPlayer === "nord") ? nordIdxToGlobal(pitLocalIdx) : sudIdxToGlobal(pitLocalIdx);
        if (board[globalIdx] === 0) {
            gameMessage.innerText = "Case vide ! Choisissez une case pleine.";
            return false;
        }

        let hasFeeding = hasFeedingMove(currentPlayer);
        if (hasFeeding) {
            let testCapture = simulateCapture(currentPlayer, pitLocalIdx);
            if (testCapture === 0) {
                gameMessage.innerText = "❌ Ce coup ne capture rien. Vous devez jouer un coup nourrissant !";
                return false;
            }
        }

        // EXÉCUTION
        let seeds = board[globalIdx];
        board[globalIdx] = 0;
        let sowingIdx = globalIdx;
        let remaining = seeds;
        while (remaining > 0) {
            sowingIdx = (sowingIdx + 1) % 12;
            board[sowingIdx]++;
            remaining--;
        }

        let lastPit = sowingIdx;
        let lastOwner = getCaseOwner(lastPit);
        let capturedTotal = 0;

        if (lastOwner !== currentPlayer && (board[lastPit] === 2 || board[lastPit] === 3)) {
            let captureIdx = lastPit;
            while (captureIdx >= 0 && getCaseOwner(captureIdx) !== currentPlayer && (board[captureIdx] === 2 || board[captureIdx] === 3)) {
                capturedTotal += board[captureIdx];
                board[captureIdx] = 0;
                captureIdx--;
                if (captureIdx < 0 || getCaseOwner(captureIdx) === currentPlayer) break;
            }
            if (capturedTotal > 0) {
                if (currentPlayer === "nord") northStore += capturedTotal;
                else southStore += capturedTotal;
            }
        }

        // Enregistrer historique
        let moveName = (currentPlayer === "nord") ? `N${pitLocalIdx+1}` : `S${pitLocalIdx+1}`;
        let tourNumber = historyMoves.length + 1;
        historyMoves.unshift({
            numero: tourNumber,
            joueur: currentPlayer === "nord" ? "Nord" : "Sud",
            coup: moveName,
            capture: capturedTotal
        });

        lastCoupDetail.innerText = `${currentPlayer === "nord" ? "Nord" : "Sud"} joue ${moveName}`;
        lastCatchSpan.innerText = capturedTotal > 0 ? `capture ${capturedTotal} graine(s)` : `aucune capture`;
        lastMoveLabel.innerText = `DERNIER COUP : ${moveName}`;

        // Changement de joueur
        currentPlayer = (currentPlayer === "nord") ? "sud" : "nord";
        updateUI();

        // Vérifier fin de partie (si un camp n'a plus de graines)
        let nordSeeds = board.slice(0,6).reduce((a,b)=>a+b,0);
        let sudSeeds = board.slice(6,12).reduce((a,b)=>a+b,0);
        if (nordSeeds === 0 || sudSeeds === 0) {
            if (nordSeeds === 0) {
                southStore += sudSeeds;
                for(let i=6;i<12;i++) board[i]=0;
            }
            if (sudSeeds === 0) {
                northStore += nordSeeds;
                for(let i=0;i<6;i++) board[i]=0;
            }
            gameOver = true;
            if (northStore > southStore) winner = "Nord";
            else if (southStore > northStore) winner = "Sud";
            else winner = "Égalité";
            updateUI();
            gameMessage.innerText = `Fin ! Victoire : ${winner}`;
        } else {
            let nextHasFeeding = hasFeedingMove(currentPlayer);
            if (!nextHasFeeding) {
                gameMessage.innerText = `⚠️ ${currentPlayer.toUpperCase()} : aucun coup nourrissant, mais jouez légalement.`;
            } else {
                gameMessage.innerText = `A vous de jouer (${currentPlayer.toUpperCase()})`;
            }
        }
        updateHistoryDisplay();
        return true;
    }

    function updateUI() {
        for (let i = 0; i < 6; i++) {
            let nordDiv = document.getElementById(`nord-${i}`);
            let sudDiv = document.getElementById(`sud-${i}`);
            if (nordDiv) nordDiv.innerText = board[nordIdxToGlobal(i)];
            if (sudDiv) sudDiv.innerText = board[sudIdxToGlobal(i)];
        }
        northStoreSpan.innerText = northStore;
        southStoreSpan.innerText = southStore;
        turnIndicator.innerText = `TOUR : ${currentPlayer.toUpperCase()}`;

        // Highlight cases jouables
        for (let i=0;i<6;i++) {
            let nordPit = document.getElementById(`nord-${i}`);
            let sudPit = document.getElementById(`sud-${i}`);
            if (nordPit) nordPit.classList.remove("highlight", "disabled");
            if (sudPit) sudPit.classList.remove("highlight", "disabled");

            if (!gameOver) {
                if (currentPlayer === "nord") {
                    let globalIdx = nordIdxToGlobal(i);
                    if (board[globalIdx] > 0) {
                        let isFeedingLegal = true;
                        if (hasFeedingMove("nord")) {
                            if (simulateCapture("nord", i) === 0) isFeedingLegal = false;
                        }
                        if (hasFeedingMove("nord") && !isFeedingLegal) nordPit.classList.add("disabled");
                        else nordPit.classList.add("highlight");
                    } else {
                        nordPit.classList.add("disabled");
                    }
                } else {
                    let globalIdx = sudIdxToGlobal(i);
                    if (board[globalIdx] > 0) {
                        let isFeedingLegal = true;
                        if (hasFeedingMove("sud")) {
                            if (simulateCapture("sud", i) === 0) isFeedingLegal = false;
                        }
                        if (hasFeedingMove("sud") && !isFeedingLegal) sudPit.classList.add("disabled");
                        else sudPit.classList.add("highlight");
                    } else {
                        sudPit.classList.add("disabled");
                    }
                }
            } else {
                if (nordPit) nordPit.classList.add("disabled");
                if (sudPit) sudPit.classList.add("disabled");
            }
        }
    }

    function updateHistoryDisplay() {
        historyListDiv.innerHTML = "";
        if (historyMoves.length === 0) {
            historyListDiv.innerHTML = "<div style='color:#7a6233;'>Aucun mouvement</div>";
            return;
        }
        for (let i = 0; i < Math.min(historyMoves.length, 16); i++) {
            let mv = historyMoves[i];
            let captureTxt = mv.capture > 0 ? `capture ${mv.capture}` : `capture 0`;
            let div = document.createElement("div");
            div.innerText = `Tour ${mv.numero} : ${mv.joueur} joue ${mv.coup}, ${captureTxt}.`;
            historyListDiv.appendChild(div);
        }
        if (historyMoves.length > 16) {
            let more = document.createElement("div");
            more.innerText = `... et ${historyMoves.length-16} autres tours`;
            more.style.fontStyle="italic";
            historyListDiv.appendChild(more);
        }
    }

    function resetGame() {
        board = [4,4,4,4,4,4,4,4,4,4,4,4];
        northStore = 0;
        southStore = 0;
        currentPlayer = "sud";
        gameOver = false;
        winner = null;
        historyMoves = [];
        lastCoupDetail.innerText = "Nord joue —";
        lastCatchSpan.innerText = "aucune capture";
        lastMoveLabel.innerText = "DERNIER COUP : —";
        gameMessage.innerText = "Nouvelle partie ! Sud commence";
        updateUI();
        updateHistoryDisplay();
    }

    function createBoardUI() {
        nordRow.innerHTML = "";
        sudRow.innerHTML = "";
        for (let i = 0; i < 6; i++) {
            let nordPit = document.createElement("div");
            nordPit.classList.add("pit");
            nordPit.id = `nord-${i}`;
            nordPit.innerText = board[i];
            nordPit.addEventListener("click", (function(idx){ return function(){ playMove(idx); }; })(i));
            nordRow.appendChild(nordPit);
        }
        for (let i = 0; i < 6; i++) {
            let sudPit = document.createElement("div");
            sudPit.classList.add("pit");
            sudPit.id = `sud-${i}`;
            sudPit.innerText = board[6+i];
            sudPit.addEventListener("click", (function(idx){ return function(){ playMove(idx); }; })(i));
            sudRow.appendChild(sudPit);
        }
    }

    resetBtn.addEventListener("click", () => { resetGame(); });
    createBoardUI();
    updateUI();
    updateHistoryDisplay();
    gameMessage.innerText = "A vous de jouer (SUD)";
</script>
</body>
  </html>
