<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Songho</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Inter:wght@400;600&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0d1117;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px;
      gap: 8px;
    }

    /* HEADER */
    #header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
    }

    #logo {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      color: #c9a84c;
      letter-spacing: 2px;
    }

    #header-right {
      font-size: 11px;
      color: #8b949e;
      text-align: right;
    }

    /* STATUS */
    #statusbar {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 6px;
    }

    .stat-box {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 6px 4px;
      text-align: center;
    }

    .stat-label {
      font-size: 9px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-value {
      font-size: 16px;
      font-weight: 700;
      color: #e6edf3;
      margin-top: 1px;
    }

    .stat-value.nord { color: #58a6ff; }
    .stat-value.sud { color: #f78166; }
    .stat-value.gold { color: #c9a84c; }

    /* GRENIER HAUT (Nord) */
    .grenier-bar {
      width: 100%;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .grenier-bar .g-label {
      font-size: 10px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .grenier-bar .g-score {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      font-weight: 800;
    }

    .grenier-bar .g-score.nord { color: #58a6ff; }
    .grenier-bar .g-score.sud { color: #f78166; }

    .grenier-bar .g-seeds {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      max-width: 180px;
      justify-content: flex-end;
    }

    .gseed {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }

    .gseed.nord { background: #58a6ff; }
    .gseed.sud { background: #f78166; }

    /* PLATEAU */
    #plateau {
      width: 100%;
      background: linear-gradient(145deg, #1c1008, #2d1a0a, #1c1008);
      border: 2px solid #5a3a1a;
      border-radius: 14px;
      padding: 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.6), 0 4px 20px rgba(0,0,0,0.5);
    }

    .board-row {
      display: flex;
      gap: 4px;
      justify-content: center;
    }

    #row-nord { flex-direction: row-reverse; }

    /* CASES */
    .pit {
      flex: 1;
      max-width: 46px;
      height: 46px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #3d2210, #1e0f05);
      border: 2px solid #5a3a1a;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      padding: 4px;
      gap: 2px;
      cursor: default;
      transition: all 0.15s;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
    }

    .pit.legal {
      border-color: #c9a84c !important;
      background: radial-gradient(circle at 35% 35%, #5c3a10, #2d1a05);
      cursor: pointer;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.3), 0 0 8px rgba(201,168,76,0.4);
    }

    .pit.legal:active { transform: scale(0.9); }
    .pit.nord-pit { border-color: #2d5a8a; }
    .pit.sud-pit { border-color: #8a2d1a; }
    .pit.disabled { opacity: 0.45; }

    /* GRAINES */
    .seed {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .pit.nord-pit .seed { background: radial-gradient(circle at 35% 35%, #7ec8f0, #2a6fa8); }
    .pit.sud-pit .seed { background: radial-gradient(circle at 35% 35%, #f5a080, #c0402a); }
    .pit.legal .seed { background: radial-gradient(circle at 35% 35%, #ffe599, #c9a84c); }

    .seed-overflow {
      font-size: 8px;
      color: #c9a84c;
      font-weight: bold;
      width: 100%;
      text-align: center;
    }

    #separator {
      height: 1px;
      background: linear-gradient(90deg, transparent, #c9a84c55, transparent);
      margin: 0 8px;
    }

    /* BAS */
    #bottom-area {
      width: 100%;
      display: flex;
      gap: 8px;
    }

    .info-box {
      flex: 1;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px;
      max-height: 110px;
      overflow-y: auto;
    }

    .box-title {
      font-size: 9px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid #21262d;
    }

    #last-move-text {
      font-size: 12px;
      color: #c9d1d9;
      line-height: 1.5;
    }

    .history-item {
      font-size: 11px;
      color: #8b949e;
      padding: 2px 0;
      border-bottom: 1px solid #21262d;
    }

    /* MODAL */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #overlay.show { display: flex; }

    #modal {
      background: #161b22;
      border: 1px solid #c9a84c;
      border-radius: 14px;
      padding: 28px 24px;
      text-align: center;
      width: 85%;
      max-width: 320px;
    }

    #modal h2 {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      color: #c9a84c;
      margin-bottom: 6px;
    }

    #modal p { color: #8b949e; font-size: 13px; margin-bottom: 18px; }

    #btn-restart {
      padding: 10px 22px;
      background: #c9a84c;
      color: #0d1117;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Cinzel', serif;
    }

    .info-box::-webkit-scrollbar { width: 3px; }
    .info-box::-webkit-scrollbar-thumb { background: #30363d; }
  </style>
</head>
<body>

  <div id="header">
    <div id="logo">⚜ SONGHO</div>
    <div id="header-right">Version locale · 2 joueurs<br><span id="move-counter">Tour 0</span></div>
  </div>

  <div id="statusbar">
    <div class="stat-box">
      <div class="stat-label">Nord</div>
      <div class="stat-value nord" id="score-nord">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Tour</div>
      <div class="stat-value gold" id="tour-joueur">Sud</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">État</div>
      <div class="stat-value gold" id="etat-jeu">En jeu</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Sud</div>
      <div class="stat-value sud" id="score-sud">0</div>
    </div>
  </div>

  <!-- Grenier Nord -->
  <div class="grenier-bar">
    <div>
      <div class="g-label">⬆ Grenier Nord</div>
      <div class="g-score nord" id="g-nord">0</div>
    </div>
    <div class="g-seeds" id="gs-nord"></div>
  </div>

  <!-- Plateau -->
  <div id="plateau">
    <div class="board-row" id="row-nord"></div>
    <div id="separator"></div>
    <div class="board-row" id="row-sud"></div>
  </div>

  <!-- Grenier Sud -->
  <div class="grenier-bar">
    <div>
      <div class="g-label">⬇ Grenier Sud</div>
      <div class="g-score sud" id="g-sud">0</div>
    </div>
    <div class="g-seeds" id="gs-sud"></div>
  </div>

  <div id="bottom-area">
    <div class="info-box">
      <div class="box-title">Dernier coup</div>
      <div id="last-move-text">—</div>
    </div>
    <div class="info-box">
      <div class="box-title">Historique</div>
      <div id="history-list"></div>
    </div>
  </div>

  <div id="overlay">
    <div id="modal">
      <h2 id="modal-title">Victoire !</h2>
      <p id="modal-body">—</p>
      <button id="btn-restart">Nouvelle partie</button>
    </div>
  </div>

  <script src="js/core/engine-full.js"></script>
  <script>
    let state = createGame("south");

    function renderSeeds(pit, count) {
      pit.innerHTML = "";
      const display = Math.min(count, 12);
      for (let i = 0; i < display; i++) {
        const s = document.createElement("div");
        s.className = "seed";
        pit.appendChild(s);
      }
      if (count > 12) {
        const lbl = document.createElement("div");
        lbl.className = "seed-overflow";
        lbl.textContent = count;
        pit.appendChild(lbl);
      }
    }

    function renderGrenierSeeds(id, count, side) {
      const el = document.getElementById(id);
      el.innerHTML = "";
      const display = Math.min(count, 24);
      for (let i = 0; i < display; i++) {
        const s = document.createElement("div");
        s.className = "gseed " + side;
        el.appendChild(s);
      }
    }

    function render() {
      const legalMoves = getLegalMoves(state);
      const legalIndexes = legalMoves.map(m => m.pitIndex);

      ["nord", "sud"].forEach(side => {
        const player = side === "nord" ? "north" : "south";
        const row = document.getElementById("row-" + side);
        row.innerHTML = "";
        for (let i = 0; i < 7; i++) {
          const pit = document.createElement("div");
          pit.className = "pit " + side + "-pit";
          const isLegal = state.currentPlayer === player && legalIndexes.includes(i);
          if (isLegal) {
            pit.classList.add("legal");
            pit.addEventListener("click", () => playMove(player, i));
          } else {
            pit.classList.add("disabled");
          }
          renderSeeds(pit, state.board[player][i]);
          row.appendChild(pit);
        }
      });

      document.getElementById("score-nord").textContent = state.scores.north;
      document.getElementById("score-sud").textContent = state.scores.south;
      document.getElementById("g-nord").textContent = state.scores.north;
      document.getElementById("g-sud").textContent = state.scores.south;
      document.getElementById("move-counter").textContent = "Tour " + state.moveNumber;
      document.getElementById("tour-joueur").textContent = state.currentPlayer === "north" ? "Nord" : "Sud";
      document.getElementById("etat-jeu").textContent = state.status === "playing" ? "En jeu" : "Terminée";

      renderGrenierSeeds("gs-nord", state.scores.north, "nord");
      renderGrenierSeeds("gs-sud", state.scores.south, "sud");

      if (state.status === "ended") {
        document.getElementById("overlay").classList.add("show");
        const w = state.winner;
        document.getElementById("modal-title").textContent =
          w === "draw" ? "Match nul !" : (w === "north" ? "Nord" : "Sud") + " gagne !";
        document.getElementById("modal-body").textContent =
          `Score final : Nord ${state.scores.north} – Sud ${state.scores.south}`;
      }
    }

    function playMove(player, pitIndex) {
      if (state.status !== "playing") return;
      const pitName = (player === "north" ? "N" : "S") + (pitIndex + 1);
      const result = applyMove(state, { player, pitIndex });
      if (!result.ok) return;
      state = result.state;
      const action = result.action;
      let desc = "";
      if (action.type === "forced-donation") {
        desc = `${player === "north" ? "Nord" : "Sud"} joue ${pitName}, don forcé de ${action.donated} graine(s).`;
      } else {
        const cap = action.capture.captured;
        const last = action.sowing.lastPosition;
        const lastName = (last.player === "north" ? "N" : "S") + (last.pitIndex + 1);
        desc = `${player === "north" ? "Nord" : "Sud"} joue ${pitName}, dernière graine en ${lastName}, capture ${cap}.`;
      }
      document.getElementById("last-move-text").textContent = desc;
      const item = document.createElement("div");
      item.className = "history-item";
      item.textContent = state.moveNumber + ". " + desc;
      const list = document.getElementById("history-list");
      list.insertBefore(item, list.firstChild);
      render();
    }

    document.getElementById("btn-restart").addEventListener("click", () => {
      state = createGame("south");
      document.getElementById("history-list").innerHTML = "";
      document.getElementById("last-move-text").textContent = "—";
      document.getElementById("overlay").classList.remove("show");
      render();
    });

    render();
  </script>
</body>
  </html>
