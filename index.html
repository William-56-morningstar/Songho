<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Awélé - Songho</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0a0a;
            font-family: 'Courier New', 'Consolas', 'Monaco', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Conteneur principal - style terminal */
        .game-container {
            background: #000000;
            max-width: 1000px;
            width: 100%;
            padding: 20px;
            border: 1px solid #2a2a2a;
        }

        /* ===== EN-TÊTE ===== */
        .connexion {
            border: 1px solid #2a6a2a;
            background: #050505;
            padding: 6px 12px;
            margin-bottom: 12px;
            display: inline-block;
        }
        .connexion .hash {
            color: #3a8a3a;
            font-weight: bold;
        }
        .connexion .connecte {
            color: #6aaa6a;
            margin-left: 5px;
        }

        /* Lignes d'info (Règles, Prise, Quitter) */
        .info-lines {
            margin: 10px 0;
            line-height: 1.6;
        }
        .info-line {
            color: #c8a84a;
            font-size: 13px;
            letter-spacing: 1px;
        }

        /* ===== ZONE PRINCIPALE ===== */
        .main-panel {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        /* Partie gauche - plateau */
        .board-panel {
            flex: 2;
            min-width: 380px;
        }

        .board {
            background: #050505;
            border: 1px solid #2a2a2a;
            padding: 15px;
        }

        .row {
            display: flex;
            justify-content: center;
            margin: 5px 0;
        }

        .cell {
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            background: #111111;
            color: #d4cc7a;
            border: 1px solid #3a3a3a;
            margin: 2px;
            cursor: pointer;
            transition: all 0.05s;
        }

        .cell.highlight {
            background: #2a3a1a;
            border-color: #8aba4a;
            color: #f0ffa0;
        }

        .cell.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .cell:active {
            transform: scale(0.96);
        }

        /* Greniers */
        .granaries {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding: 0 10px;
        }

        .granary {
            background: #050505;
            border: 1px solid #3a3a3a;
            padding: 8px 25px;
            text-align: center;
        }

        .granary-label {
            font-size: 10px;
            color: #6a6a3a;
            letter-spacing: 2px;
        }

        .granary-value {
            font-size: 28px;
            font-weight: bold;
            color: #d4cc7a;
        }

        /* Infos sous le plateau */
        .turn-info {
            margin-top: 15px;
            background: #050505;
            border: 1px solid #2a2a2a;
            padding: 10px;
        }

        .turn-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 8px;
        }

        .turn-badge {
            background: #0a0a0a;
            border: 1px solid #3a8a3a;
            padding: 4px 12px;
            color: #5aaa5a;
            font-weight: bold;
            font-size: 14px;
        }

        .status-badge {
            color: #c8a84a;
            font-size: 13px;
        }

        .message {
            color: #aa8844;
            font-size: 12px;
            margin-top: 8px;
            padding-top: 5px;
            border-top: 1px solid #2a2a2a;
        }

        .reset-btn {
            background: #1a1a1a;
            border: 1px solid #5a5a3a;
            color: #aa8844;
            padding: 5px 15px;
            cursor: pointer;
            font-family: monospace;
            font-size: 11px;
            margin-top: 10px;
        }

        .reset-btn:active {
            background: #2a2a1a;
        }

        /* Partie droite - historique */
        .history-panel {
            flex: 1;
            min-width: 250px;
            background: #050505;
            border: 1px solid #2a2a2a;
            padding: 12px;
        }

        .history-title {
            color: #c8a84a;
            font-weight: bold;
            font-size: 13px;
            border-bottom: 1px solid #3a3a3a;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        .last-move {
            background: #0a0a0a;
            padding: 8px;
            margin-bottom: 15px;
            border-left: 3px solid #5a9a5a;
        }

        .last-move-label {
            color: #6a6a4a;
            font-size: 10px;
        }

        .last-move-detail {
            color: #aa8844;
            font-size: 11px;
            margin-top: 3px;
        }

        .history-list {
            max-height: 350px;
            overflow-y: auto;
        }

        .history-item {
            color: #7a7a5a;
            font-size: 10px;
            padding: 4px 0;
            border-bottom: 1px dashed #2a2a2a;
            font-family: monospace;
        }

        /* Scrollbar */
        .history-list::-webkit-scrollbar {
            width: 5px;
        }
        .history-list::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        .history-list::-webkit-scrollbar-thumb {
            background: #4a4a2a;
        }
    </style>
</head>
<body>
<div class="game-container">
    <!-- CONNEXION -->
    <div class="connexion">
        <span class="hash"># CONNEXION</span>
        <span class="connecte">Connecte</span>
    </div>

    <!-- Info / Règles / Prise / Quitter -->
    <div class="info-lines">
        <div class="info-line"># Info</div>
        <div class="info-line">Regles</div>
        <div class="info-line">Prise</div>
        <div class="info-line">Quitter</div>
    </div>

    <div class="main-panel">
        <!-- PARTIE GAUCHE : PLATEAU -->
        <div class="board-panel">
            <div class="board">
                <!-- Ligne NORD (cases 1 à 6) -->
                <div class="row row-nord" id="nord-row"></div>
                <!-- Ligne SUD (cases 1 à 6) -->
                <div class="row row-sud" id="sud-row"></div>

                <!-- Greniers -->
                <div class="granaries">
                    <div class="granary">
                        <div class="granary-label">NORD</div>
                        <div class="granary-value" id="north-store">0</div>
                    </div>
                    <div class="granary">
                        <div class="granary-label">SUD</div>
                        <div class="granary-value" id="south-store">0</div>
                    </div>
                </div>
            </div>

            <!-- Infos tour / état / message -->
            <div class="turn-info">
                <div class="turn-row">
                    <div class="turn-badge" id="turn-indicator">TOUR : SUD</div>
                    <div class="status-badge" id="status-text">En jeu</div>
                </div>
                <div class="message" id="game-message">A vous de jouer</div>
                <button class="reset-btn" id="reset-game">⟳ Nouvelle partie</button>
            </div>
        </div>

        <!-- PARTIE DROITE : HISTORIQUE -->
        <div class="history-panel">
            <div class="history-title"># DERNIER COUP</div>
            <div class="last-move">
                <div class="last-move-label" id="last-move-label">Dernier coup</div>
                <div class="last-move-detail" id="last-coup-detail">—</div>
            </div>

            <div class="history-title"># HISTORIQUE</div>
            <div class="history-list" id="history-list">
                <div class="history-item">Aucun coup</div>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== MOTEUR AWÉLÉ COMPLET ==========
    let board = [4,4,4,4,4,4, 4,4,4,4,4,4];
    let northStore = 0;
    let southStore = 0;
    let currentPlayer = "sud";
    let gameOver = false;
    let winner = null;
    let historyMoves = [];

    // DOM elements
    const nordRow = document.getElementById("nord-row");
    const sudRow = document.getElementById("sud-row");
    const northStoreSpan = document.getElementById("north-store");
    const southStoreSpan = document.getElementById("south-store");
    const turnIndicator = document.getElementById("turn-indicator");
    const gameMessage = document.getElementById("game-message");
    const statusText = document.getElementById("status-text");
    const lastCoupDetail = document.getElementById("last-coup-detail");
    const historyListDiv = document.getElementById("history-list");
    const resetBtn = document.getElementById("reset-game");

    function isNordCase(idx) { return idx >= 0 && idx <= 5; }
    function getCaseOwner(idx) { return isNordCase(idx) ? "nord" : "sud"; }
    function nordIdxToGlobal(pos) { return pos; }
    function sudIdxToGlobal(pos) { return 6 + pos; }

    // Vérifie si un joueur a au moins un coup nourrissant
    function hasFeedingMove(player) {
        for (let i = 0; i < 6; i++) {
            let globalIdx = (player === "nord") ? nordIdxToGlobal(i) : sudIdxToGlobal(i);
            if (board[globalIdx] === 0) continue;
            let seeds = board[globalIdx];
            let tempBoard = [...board];
            let idx = globalIdx;
            let s = seeds;
            tempBoard[idx] = 0;
            let current = idx;
            while (s > 0) {
                current = (current + 1) % 12;
                tempBoard[current]++;
                s--;
            }
            let lastPit = current;
            let lastOwner = getCaseOwner(lastPit);
            let captured = 0;
            if (lastOwner !== player && (tempBoard[lastPit] === 2 || tempBoard[lastPit] === 3)) {
                let captureIdx = lastPit;
                while (captureIdx >= 0 && getCaseOwner(captureIdx) !== player && (tempBoard[captureIdx] === 2 || tempBoard[captureIdx] === 3)) {
                    captured += tempBoard[captureIdx];
                    captureIdx--;
                    if (captureIdx < 0 || getCaseOwner(captureIdx) === player) break;
                }
            }
            if (captured > 0) return true;
        }
        return false;
    }

    function simulateCapture(player, pitLocalIdx) {
        let globalIdx = (player === "nord") ? nordIdxToGlobal(pitLocalIdx) : sudIdxToGlobal(pitLocalIdx);
        let seeds = board[globalIdx];
        if (seeds === 0) return 0;
        let tempBoard = [...board];
        let idx = globalIdx;
        let s = seeds;
        tempBoard[idx] = 0;
        let current = idx;
        while (s > 0) {
            current = (current + 1) % 12;
            tempBoard[current]++;
            s--;
        }
        let lastPit = current;
        let lastOwner = getCaseOwner(lastPit);
        let captured = 0;
        if (lastOwner !== player && (tempBoard[lastPit] === 2 || tempBoard[lastPit] === 3)) {
            let captureIdx = lastPit;
            while (captureIdx >= 0 && getCaseOwner(captureIdx) !== player && (tempBoard[captureIdx] === 2 || tempBoard[captureIdx] === 3)) {
                captured += tempBoard[captureIdx];
                captureIdx--;
                if (captureIdx < 0 || getCaseOwner(captureIdx) === player) break;
            }
        }
        return captured;
    }

    function playMove(pitLocalIdx) {
        if (gameOver) {
            gameMessage.innerText = "Partie terminée !";
            return false;
        }

        let globalIdx = (currentPlayer === "nord") ? nordIdxToGlobal(pitLocalIdx) : sudIdxToGlobal(pitLocalIdx);
        if (board[globalIdx] === 0) {
            gameMessage.innerText = "Case vide ! Choisissez une case pleine.";
            return false;
        }

        let hasFeeding = hasFeedingMove(currentPlayer);
        if (hasFeeding) {
            let testCapture = simulateCapture(currentPlayer, pitLocalIdx);
            if (testCapture === 0) {
                gameMessage.innerText = "❌ Ce coup ne capture rien. Vous devez jouer un coup nourrissant !";
                return false;
            }
        }

        // Exécution du coup
        let seeds = board[globalIdx];
        board[globalIdx] = 0;
        let sowingIdx = globalIdx;
        let remaining = seeds;
        while (remaining > 0) {
            sowingIdx = (sowingIdx + 1) % 12;
            board[sowingIdx]++;
            remaining--;
        }

        let lastPit = sowingIdx;
        let lastOwner = getCaseOwner(lastPit);
        let capturedTotal = 0;

        if (lastOwner !== currentPlayer && (board[lastPit] === 2 || board[lastPit] === 3)) {
            let captureIdx = lastPit;
            while (captureIdx >= 0 && getCaseOwner(captureIdx) !== currentPlayer && (board[captureIdx] === 2 || board[captureIdx] === 3)) {
                capturedTotal += board[captureIdx];
                board[captureIdx] = 0;
                captureIdx--;
                if (captureIdx < 0 || getCaseOwner(captureIdx) === currentPlayer) break;
            }
            if (capturedTotal > 0) {
                if (currentPlayer === "nord") northStore += capturedTotal;
                else southStore += capturedTotal;
            }
        }

        // Enregistrement historique
        let moveName = (currentPlayer === "nord") ? `N${pitLocalIdx+1}` : `S${pitLocalIdx+1}`;
        let tourNumber = historyMoves.length + 1;
        historyMoves.unshift({
            numero: tourNumber,
            joueur: currentPlayer === "nord" ? "Nord" : "Sud",
            coup: moveName,
            capture: capturedTotal
        });

        // Dernier coup (style exact capture)
        let captureText = capturedTotal > 0 ? `capture ${capturedTotal}` : `aucune capture`;
        let lastPosition = `dernière graine en ${getCaseOwner(lastPit) === "nord" ? "N" : "S"}${(lastPit % 6) + 1}`;
        lastCoupDetail.innerHTML = `${currentPlayer === "nord" ? "Nord" : "Sud"} joue ${moveName}, ${lastPosition}, ${captureText}.`;

        // Changement de joueur
        currentPlayer = (currentPlayer === "nord") ? "sud" : "nord";
        updateUI();

        // Vérifier fin de partie
        let nordSeeds = board.slice(0,6).reduce((a,b)=>a+b,0);
        let sudSeeds = board.slice(6,12).reduce((a,b)=>a+b,0);
        if (nordSeeds === 0 || sudSeeds === 0) {
            if (nordSeeds === 0) {
                southStore += sudSeeds;
                for(let i=6;i<12;i++) board[i]=0;
            }
            if (sudSeeds === 0) {
                northStore += nordSeeds;
                for(let i=0;i<6;i++) board[i]=0;
            }
            gameOver = true;
            if (northStore > southStore) winner = "Nord";
            else if (southStore > northStore) winner = "Sud";
            else winner = "Égalité";
            updateUI();
            statusText.innerText = "Terminée";
            gameMessage.innerText = `Fin ! Victoire : ${winner}`;
        } else {
            let nextHasFeeding = hasFeedingMove(currentPlayer);
            if (!nextHasFeeding) {
                gameMessage.innerText = `❗ ${currentPlayer.toUpperCase()} : aucun coup nourrissant, mais jouez légalement.`;
            } else {
                gameMessage.innerText = `A vous de jouer (${currentPlayer.toUpperCase()})`;
            }
        }
        updateHistoryDisplay();
        return true;
    }

    function updateUI() {
        for (let i = 0; i < 6; i++) {
            let nordDiv = document.getElementById(`nord-${i}`);
            let sudDiv = document.getElementById(`sud-${i}`);
            if (nordDiv) nordDiv.innerText = board[nordIdxToGlobal(i)];
            if (sudDiv) sudDiv.innerText = board[sudIdxToGlobal(i)];
        }
        northStoreSpan.innerText = northStore;
        southStoreSpan.innerText = southStore;
        turnIndicator.innerText = `TOUR : ${currentPlayer.toUpperCase()}`;

        // Highlight
        for (let i = 0; i < 6; i++) {
            let nordPit = document.getElementById(`nord-${i}`);
            let sudPit = document.getElementById(`sud-${i}`);
            if (nordPit) nordPit.classList.remove("highlight", "disabled");
            if (sudPit) sudPit.classList.remove("highlight", "disabled");

            if (!gameOver) {
                if (currentPlayer === "nord") {
                    let globalIdx = nordIdxToGlobal(i);
                    if (board[globalIdx] > 0) {
                        let isFeedingLegal = true;
                        if (hasFeedingMove("nord")) {
                            if (simulateCapture("nord", i) === 0) isFeedingLegal = false;
                        }
                        if (hasFeedingMove("nord") && !isFeedingLegal) nordPit.classList.add("disabled");
                        else nordPit.classList.add("highlight");
                    } else {
                        nordPit.classList.add("disabled");
                    }
                } else {
                    let globalIdx = sudIdxToGlobal(i);
                    if (board[globalIdx] > 0) {
                        let isFeedingLegal = true;
                        if (hasFeedingMove("sud")) {
                            if (simulateCapture("sud", i) === 0) isFeedingLegal = false;
                        }
                        if (hasFeedingMove("sud") && !isFeedingLegal) sudPit.classList.add("disabled");
                        else sudPit.classList.add("highlight");
                    } else {
                        sudPit.classList.add("disabled");
                    }
                }
            } else {
                if (nordPit) nordPit.classList.add("disabled");
                if (sudPit) sudPit.classList.add("disabled");
            }
        }
    }

    function updateHistoryDisplay() {
        historyListDiv.innerHTML = "";
        if (historyMoves.length === 0) {
            historyListDiv.innerHTML = "<div class='history-item'>Aucun coup</div>";
            return;
        }
        for (let i = 0; i < Math.min(historyMoves.length, 20); i++) {
            let mv = historyMoves[i];
            let captureTxt = mv.capture > 0 ? `capture ${mv.capture}` : `capture 0`;
            let div = document.createElement("div");
            div.className = "history-item";
            div.innerText = `${mv.numero}. Tour ${mv.numero} : ${mv.joueur} joue ${mv.coup}, ${captureTxt}.`;
            historyListDiv.appendChild(div);
        }
    }

    function resetGame() {
        board = [4,4,4,4,4,4,4,4,4,4,4,4];
        northStore = 0;
        southStore = 0;
        currentPlayer = "sud";
        gameOver = false;
        winner = null;
        historyMoves = [];
        statusText.innerText = "En jeu";
        lastCoupDetail.innerHTML = "—";
        gameMessage.innerText = "Nouvelle partie ! Sud commence";
        updateUI();
        updateHistoryDisplay();
    }

    function createBoardUI() {
        nordRow.innerHTML = "";
        sudRow.innerHTML = "";
        for (let i = 0; i < 6; i++) {
            let nordPit = document.createElement("div");
            nordPit.className = "cell";
            nordPit.id = `nord-${i}`;
            nordPit.innerText = board[i];
            nordPit.addEventListener("click", (function(idx){ return function(){ playMove(idx); }; })(i));
            nordRow.appendChild(nordPit);
        }
        for (let i = 0; i < 6; i++) {
            let sudPit = document.createElement("div");
            sudPit.className = "cell";
            sudPit.id = `sud-${i}`;
            sudPit.innerText = board[6+i];
            sudPit.addEventListener("click", (function(idx){ return function(){ playMove(idx); }; })(i));
            sudRow.appendChild(sudPit);
        }
    }

    resetBtn.addEventListener("click", () => { resetGame(); });
    createBoardUI();
    updateUI();
    updateHistoryDisplay();
    gameMessage.innerText = "A vous de jouer (SUD)";
    statusText.innerText = "En jeu";
</script>
</body>
</html>
