<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Songho</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Inter:wght@400;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 10%, rgba(201,168,76,0.08), transparent 40%),
        #f3ece0;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 14px;
      gap: 10px;
    }

    /* HEADER */
    #header {
      width: 100%;
      max-width: 720px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      background: #fffdf8;
      border: 1px solid #e3d7bd;
      border-radius: 12px;
      box-shadow: 0 2px 10px rgba(90, 58, 26, 0.06);
    }

    #logo-block { display: flex; align-items: center; gap: 10px; }

    #logo-icon {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #2d2114, #0d0906);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #c9a84c;
      font-family: 'Cinzel', serif;
      font-weight: 800;
      font-size: 13px;
      flex-shrink: 0;
    }

    #logo-text .g-tag {
      font-size: 10px;
      color: #a68a52;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }

    #logo-text .g-title {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      font-weight: 800;
      color: #2d2114;
      letter-spacing: 1px;
    }

    #author-box {
      text-align: right;
      font-size: 10px;
      color: #8a7452;
      line-height: 1.5;
      white-space: nowrap;
    }

    #author-box .a-label {
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 9px;
      color: #b39d6f;
    }

    #author-box .a-name {
      font-weight: 700;
      font-size: 13px;
      color: #2d2114;
    }

    /* STATUS */
    #statusbar {
      width: 100%;
      max-width: 720px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 8px;
    }

    .stat-box {
      background: #fffdf8;
      border: 1px solid #e3d7bd;
      border-radius: 10px;
      padding: 8px 4px;
      text-align: center;
    }

    .stat-label {
      font-size: 9px;
      color: #a68a52;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: #2d2114;
      margin-top: 2px;
    }

    .stat-value.nord { color: #2a6fa8; }
    .stat-value.sud { color: #c0402a; }
    .stat-value.gold { color: #a97e1e; }

    /* GRENIER */
    .grenier-bar {
      width: 100%;
      max-width: 720px;
      background: #fffdf8;
      border: 1px solid #e3d7bd;
      border-radius: 10px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .grenier-bar .g-label {
      font-size: 10px;
      color: #a68a52;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .grenier-bar .g-score {
      font-family: 'Cinzel', serif;
      font-size: 24px;
      font-weight: 800;
    }

    .grenier-bar .g-score.nord { color: #2a6fa8; }
    .grenier-bar .g-score.sud { color: #c0402a; }

    .grenier-bar .g-seeds {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      max-width: 200px;
      justify-content: flex-end;
    }

    .gseed {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }

    .gseed.nord { background: #2a6fa8; }
    .gseed.sud { background: #c0402a; }

    /* PLATEAU */
    #plateau {
      width: 100%;
      max-width: 720px;
      background: linear-gradient(160deg, #caa06a, #a87b45, #8a5f31);
      border: 2px solid #6b4423;
      border-radius: 18px;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      box-shadow: inset 0 2px 10px rgba(60,35,10,0.35), 0 6px 20px rgba(90,58,26,0.25);
    }

    .board-row {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    #row-nord { flex-direction: row-reverse; }

    /* CASES */
    .pit {
      flex: 1;
      max-width: 78px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #d9b98a, #7a5330);
      border: 3px solid #6b4423;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: default;
      transition: all 0.15s;
      box-shadow: inset 0 3px 6px rgba(0,0,0,0.35);
      position: relative;
    }

    .pit-count {
      font-size: 11px;
      font-weight: 700;
      color: #3a2712;
      background: rgba(255,255,255,0.55);
      border-radius: 8px;
      padding: 0 5px;
      margin-bottom: 3px;
    }

    .pit-seeds {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 2px;
      max-width: 42px;
    }

    .pit.legal {
      border-color: #c9a84c !important;
      box-shadow: inset 0 3px 6px rgba(0,0,0,0.25), 0 0 10px rgba(201,168,76,0.6);
      cursor: pointer;
    }

    .pit.legal:active { transform: scale(0.92); }
    .pit.disabled { opacity: 0.6; }

    /* GRAINES */
    .seed {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .nord-pit .seed { background: radial-gradient(circle at 35% 35%, #7ec8f0, #2a6fa8); }
    .sud-pit .seed { background: radial-gradient(circle at 35% 35%, #f5a080, #c0402a); }

    .seed-overflow {
      font-size: 8px;
      color: #3a2712;
      font-weight: bold;
      width: 100%;
      text-align: center;
    }

    #separator {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      margin: 0 8px;
    }

    /* BAS */
    #bottom-area {
      width: 100%;
      max-width: 720px;
      display: flex;
      gap: 10px;
    }

    .info-box {
      flex: 1;
      background: #fffdf8;
      border: 1px solid #e3d7bd;
      border-radius: 10px;
      padding: 12px;
      max-height: 120px;
      overflow-y: auto;
    }

    .box-title {
      font-size: 9px;
      color: #a68a52;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
      padding-bottom: 5px;
      border-bottom: 1px solid #ecdfc4;
    }

    #last-move-text {
      font-size: 12px;
      color: #4a3a20;
      line-height: 1.5;
    }

    .history-item {
      font-size: 11px;
      color: #8a7452;
      padding: 3px 0;
      border-bottom: 1px solid #f0e6cf;
    }

    /* MODAL */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(30, 20, 8, 0.55);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #overlay.show { display: flex; }

    #modal {
      background: #fffdf8;
      border: 1px solid #c9a84c;
      border-radius: 16px;
      padding: 30px 26px;
      text-align: center;
      width: 85%;
      max-width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    #modal h2 {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      color: #a97e1e;
      margin-bottom: 6px;
    }

    #modal p { color: #8a7452; font-size: 13px; margin-bottom: 18px; }

    #btn-restart {
      padding: 10px 22px;
      background: #a97e1e;
      color: #fffdf8;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Cinzel', serif;
    }

    .info-box::-webkit-scrollbar { width: 3px; }
    .info-box::-webkit-scrollbar-thumb { background: #e3d7bd; }

    @media (max-width: 420px) {
      #author-box { font-size: 9px; }
      #author-box .a-name { font-size: 11px; }
      .pit { max-width: 44px; }
      .pit-seeds { max-width: 30px; }
    }
  </style>
</head>
<body>

  <div id="header">
    <div id="logo-block">
      <div id="logo-icon">⚜</div>
      <div id="logo-text">
        <div class="g-tag">Version locale · 2 joueurs</div>
        <div class="g-title">SONGHO</div>
      </div>
    </div>
    <div id="author-box">
      <div class="a-label">Réalisé par</div>
      <div class="a-name">FOUDA ENAMA</div>
      <div>Étudiante dev</div>
    </div>
  </div>

  <div id="statusbar">
    <div class="stat-box">
      <div class="stat-label">Nord</div>
      <div class="stat-value nord" id="score-nord">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Tour</div>
      <div class="stat-value gold" id="tour-joueur">Sud</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">État</div>
      <div class="stat-value gold" id="etat-jeu">En jeu</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Sud</div>
      <div class="stat-value sud" id="score-sud">0</div>
    </div>
  </div>

  <!-- Grenier Nord -->
  <div class="grenier-bar">
    <div>
      <div class="g-label">⬆ Grenier Nord</div>
      <div class="g-score nord" id="g-nord">0</div>
    </div>
    <div class="g-seeds" id="gs-nord"></div>
  </div>

  <!-- Plateau -->
  <div id="plateau">
    <div class="board-row" id="row-nord"></div>
    <div id="separator"></div>
    <div class="board-row" id="row-sud"></div>
  </div>

  <!-- Grenier Sud -->
  <div class="grenier-bar">
    <div>
      <div class="g-label">⬇ Grenier Sud</div>
      <div class="g-score sud" id="g-sud">0</div>
    </div>
    <div class="g-seeds" id="gs-sud"></div>
  </div>

  <div id="bottom-area">
    <div class="info-box">
      <div class="box-title">Dernier coup</div>
      <div id="last-move-text">—</div>
    </div>
    <div class="info-box">
      <div class="box-title">Historique</div>
      <div id="history-list"></div>
    </div>
  </div>

  <div id="overlay">
    <div id="modal">
      <h2 id="modal-title">Victoire !</h2>
      <p id="modal-body">—</p>
      <button id="btn-restart">Nouvelle partie</button>
    </div>
  </div>

  <script src="js/core/engine-full.js"></script>
  <script>
    let state = createGame("south");

    function renderSeeds(container, count, side) {
      const countLabel = document.createElement("div");
      countLabel.className = "pit-count";
      countLabel.textContent = count;
      container.appendChild(countLabel);

      const seedsWrap = document.createElement("div");
      seedsWrap.className = "pit-seeds";
      const display = Math.min(count, 9);
      for (let i = 0; i < display; i++) {
        const s = document.createElement("div");
        s.className = "seed";
        seedsWrap.appendChild(s);
      }
      if (count > 9) {
        const lbl = document.createElement("div");
        lbl.className = "seed-overflow";
        lbl.textContent = "+" + (count - 9);
        seedsWrap.appendChild(lbl);
      }
      container.appendChild(seedsWrap);
    }

    function renderGrenierSeeds(id, count, side) {
      const el = document.getElementById(id);
      el.innerHTML = "";
      const display = Math.min(count, 24);
      for (let i = 0; i < display; i++) {
        const s = document.createElement("div");
        s.className = "gseed " + side;
        el.appendChild(s);
      }
    }

    function render() {
      const legalMoves = getLegalMoves(state);
      const legalIndexes = legalMoves.map(m => m.pitIndex);

      ["nord", "sud"].forEach(side => {
        const player = side === "nord" ? "north" : "south";
        const row = document.getElementById("row-" + side);
        row.innerHTML = "";
        for (let i = 0; i < 7; i++) {
          const pit = document.createElement("div");
          pit.className = "pit " + side + "-pit";
          const isLegal = state.currentPlayer === player && legalIndexes.includes(i);
          if (isLegal) {
            pit.classList.add("legal");
            pit.addEventListener("click", () => playMove(player, i));
          } else {
            pit.classList.add("disabled");
          }
          renderSeeds(pit, state.board[player][i], side);
          row.appendChild(pit);
        }
      });

      document.getElementById("score-nord").textContent = state.scores.north;
      document.getElementById("score-sud").textContent = state.scores.south;
      document.getElementById("g-nord").textContent = state.scores.north;
      document.getElementById("g-sud").textContent = state.scores.south;
      document.getElementById("tour-joueur").textContent = state.currentPlayer === "north" ? "Nord" : "Sud";
      document.getElementById("etat-jeu").textContent = state.status === "playing" ? "En jeu" : "Terminée";

      renderGrenierSeeds("gs-nord", state.scores.north, "nord");
      renderGrenierSeeds("gs-sud", state.scores.south, "sud");

      if (state.status === "ended") {
        document.getElementById("overlay").classList.add("show");
        const w = state.winner;
        document.getElementById("modal-title").textContent =
          w === "draw" ? "Match nul !" : (w === "north" ? "Nord" : "Sud") + " gagne !";
        document.getElementById("modal-body").textContent =
          `Score final : Nord ${state.scores.north} – Sud ${state.scores.south}`;
      }
    }

    function playMove(player, pitIndex) {
      if (state.status !== "playing") return;
      const pitName = (player === "north" ? "N" : "S") + (pitIndex + 1);
      const result = applyMove(state, { player, pitIndex });
      if (!result.ok) return;
      state = result.state;
      const action = result.action;
      let desc = "";
      if (action.type === "forced-donation") {
        desc = `${player === "north" ? "Nord" : "Sud"} joue ${pitName}, don forcé de ${action.donated} graine(s).`;
      } else {
        const cap = action.capture.captured;
        const last = action.sowing.lastPosition;
        const lastName = (last.player === "north" ? "N" : "S") + (last.pitIndex + 1);
        desc = `${player === "north" ? "Nord" : "Sud"} joue ${pitName}, dernière graine en ${lastName}, capture ${cap}.`;
      }
      document.getElementById("last-move-text").textContent = desc;
      const item = document.createElement("div");
      item.className = "history-item";
      item.textContent = state.moveNumber + ". " + desc;
      const list = document.getElementById("history-list");
      list.insertBefore(item, list.firstChild);
      render();
    }

    document.getElementById("btn-restart").addEventListener("click", () => {
      state = createGame("south");
      document.getElementById("history-list").innerHTML = "";
      document.getElementById("last-move-text").textContent = "—";
      document.getElementById("overlay").classList.remove("show");
      render();
    });

    render();
  </script>
</body>
</html>
