<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Songho — Version Locale</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a0f05;
      font-family: 'Cinzel', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px;
      gap: 8px;
      min-height: 100vh;
    }
    #header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(135deg, #2a1a08, #4a2e10);
      border: 1px solid #8b6020;
      border-radius: 10px;
      padding: 10px 14px;
    }
    #logo { font-size: 20px; color: #d4a017; letter-spacing: 3px; }
    #header-right { font-size: 10px; color: #a08040; text-align: right; line-height: 1.6; font-family: sans-serif; }
    #statusbar {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 6px;
    }
    .stat-box {
      background: linear-gradient(145deg, #2a1a08, #3d2510);
      border: 1px solid #5a3e10;
      border-radius: 8px;
      padding: 6px 4px;
      text-align: center;
    }
    .stat-label { font-size: 9px; color: #8b6914; text-transform: uppercase; letter-spacing: 1px; font-family: sans-serif; }
    .stat-value { font-size: 18px; font-weight: 700; margin-top: 1px; font-family: 'Cinzel', serif; }
    .stat-value.nord { color: #60aaff; }
    .stat-value.sud { color: #ff6b4a; }
    .stat-value.gold { color: #d4a017; }
    #canvas-wrapper { width: 100%; }
    canvas { width: 100%; height: auto; display: block; touch-action: manipulation; }
    #bottom-area { width: 100%; display: flex; gap: 8px; }
    .info-box {
      flex: 1;
      background: linear-gradient(145deg, #2a1a08, #3d2510);
      border: 1px solid #5a3e10;
      border-radius: 8px;
      padding: 10px;
      max-height: 90px;
      overflow-y: auto;
    }
    .box-title { font-size: 9px; color: #8b6914; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; padding-bottom: 4px; border-bottom: 1px solid #4a3010; font-family: sans-serif; }
    #last-move-text { font-size: 11px; color: #c8a060; line-height: 1.5; font-family: sans-serif; }
    .history-item { font-size: 10px; color: #8b6914; padding: 2px 0; border-bottom: 1px solid #3a2508; font-family: sans-serif; }
    #overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.88); z-index: 100;
      align-items: center; justify-content: center;
    }
    #overlay.show { display: flex; }
    #modal {
      background: linear-gradient(145deg, #2a1a08, #3d2510);
      border: 2px solid #d4a017; border-radius: 16px;
      padding: 30px 24px; text-align: center; width: 85%; max-width: 320px;
    }
    #modal h2 { font-size: 24px; color: #d4a017; margin-bottom: 8px; }
    #modal p { color: #a08040; font-size: 13px; margin-bottom: 20px; font-family: sans-serif; }
    #btn-restart {
      padding: 10px 24px; background: linear-gradient(135deg, #d4a017, #a07010);
      color: #1a0a02; border: none; border-radius: 8px; font-size: 14px;
      font-weight: 700; cursor: pointer; font-family: 'Cinzel', serif;
    }
  </style>
</head>
<body>

<div id="header">
  <div id="logo">⚜ SONGHO</div>
  <div id="header-right">Version locale · 2 joueurs<br><span id="move-counter">Tour 0</span></div>
</div>

<div id="statusbar">
  <div class="stat-box">
    <div class="stat-label">Nord</div>
    <div class="stat-value nord" id="score-nord">0</div>
  </div>
  <div class="stat-box">
    <div class="stat-label">Tour</div>
    <div class="stat-value gold" id="tour-joueur">Sud</div>
  </div>
  <div class="stat-box">
    <div class="stat-label">État</div>
    <div class="stat-value gold" id="etat-jeu">En jeu</div>
  </div>
  <div class="stat-box">
    <div class="stat-label">Sud</div>
    <div class="stat-value sud" id="score-sud">0</div>
  </div>
</div>

<div id="canvas-wrapper">
  <canvas id="gameCanvas"></canvas>
</div>

<div id="bottom-area">
  <div class="info-box">
    <div class="box-title">Dernier coup</div>
    <div id="last-move-text">—</div>
  </div>
  <div class="info-box">
    <div class="box-title">Historique</div>
    <div id="history-list"></div>
  </div>
</div>

<div id="overlay">
  <div id="modal">
    <h2 id="modal-title">Victoire !</h2>
    <p id="modal-body">—</p>
    <button id="btn-restart">Nouvelle partie</button>
  </div>
</div>

<script>
// ==================== MOTEUR COMPLET ====================
function createGame(startingPlayer = "south") {
  return {
    board: {
      north: [5,5,5,5,5,5,5],
      south: [5,5,5,5,5,5,5]
    },
    scores: { north: 0, south: 0 },
    currentPlayer: startingPlayer,
    status: "playing",
    winner: null,
    moveNumber: 1,
    lastMoveDesc: ""
  };
}

function getLegalMoves(state) {
  if (state.status !== "playing") return [];
  const pits = state.board[state.currentPlayer];
  const moves = [];
  for (let i = 0; i < 7; i++) {
    if (pits[i] > 0) moves.push({ player: state.currentPlayer, pitIndex: i });
  }
  return moves;
}

function applyMove(state, move) {
  if (state.status !== "playing") return { ok: false };
  if (move.player !== state.currentPlayer) return { ok: false };
  if (state.board[move.player][move.pitIndex] === 0) return { ok: false };

  let newState = JSON.parse(JSON.stringify(state));
  let seeds = newState.board[move.player][move.pitIndex];
  newState.board[move.player][move.pitIndex] = 0;
  
  let currentPlayer = move.player;
  let currentRow = move.player;
  let currentIdx = move.pitIndex;
  let lastPos = null;
  let sowingPath = [];

  while (seeds > 0) {
    if (currentRow === move.player && currentIdx === move.pitIndex) {
      if (currentRow === "north") {
        if (currentIdx + 1 < 7) currentIdx++;
        else { currentRow = "south"; currentIdx = 0; }
      } else {
        if (currentIdx + 1 < 7) currentIdx++;
        else { currentRow = "north"; currentIdx = 0; }
      }
    } else {
      newState.board[currentRow][currentIdx]++;
      sowingPath.push({ player: currentRow, pitIndex: currentIdx });
      seeds--;
      lastPos = { player: currentRow, pitIndex: currentIdx };
      if (seeds === 0) break;
      if (currentRow === "north") {
        if (currentIdx + 1 < 7) currentIdx++;
        else { currentRow = "south"; currentIdx = 0; }
      } else {
        if (currentIdx + 1 < 7) currentIdx++;
        else { currentRow = "north"; currentIdx = 0; }
      }
    }
  }

  let captured = 0;
  let captureDesc = "";

  if (lastPos && lastPos.player === move.player && newState.board[lastPos.player][lastPos.pitIndex] === 1) {
    let oppRow = lastPos.player === "north" ? "south" : "north";
    let oppPit = lastPos.pitIndex;
    if (newState.board[oppRow][oppPit] > 0) {
      captured = newState.board[oppRow][oppPit];
      newState.scores[move.player] += captured + 1;
      newState.board[oppRow][oppPit] = 0;
      newState.board[lastPos.player][lastPos.pitIndex] = 0;
      captureDesc = `capture ${captured}`;
    } else {
      captureDesc = `aucune capture`;
    }
  } else {
    captureDesc = `aucune capture`;
  }

  const northEmpty = newState.board.north.every(v => v === 0);
  const southEmpty = newState.board.south.every(v => v === 0);
  
  if (northEmpty || southEmpty) {
    let remainingNorth = newState.board.north.reduce((a,b)=>a+b,0);
    let remainingSouth = newState.board.south.reduce((a,b)=>a+b,0);
    newState.scores.north += remainingNorth;
    newState.scores.south += remainingSouth;
    newState.board.north.fill(0);
    newState.board.south.fill(0);
    newState.status = "ended";
    if (newState.scores.north > newState.scores.south) newState.winner = "north";
    else if (newState.scores.south > newState.scores.north) newState.winner = "south";
    else newState.winner = "draw";
  } else {
    newState.currentPlayer = newState.currentPlayer === "north" ? "south" : "north";
    let nextMoves = getLegalMoves(newState);
    if (nextMoves.length === 0) {
      let remainingNorth = newState.board.north.reduce((a,b)=>a+b,0);
      let remainingSouth = newState.board.south.reduce((a,b)=>a+b,0);
      newState.scores.north += remainingNorth;
      newState.scores.south += remainingSouth;
      newState.board.north.fill(0);
      newState.board.south.fill(0);
      newState.status = "ended";
      if (newState.scores.north > newState.scores.south) newState.winner = "north";
      else if (newState.scores.south > newState.scores.north) newState.winner = "south";
      else newState.winner = "draw";
    }
  }
  
  let lastPosStr = lastPos ? `${lastPos.player === "north" ? "N" : "S"}${lastPos.pitIndex + 1}` : "-";
  let desc = `${move.player === "north" ? "Nord" : "Sud"} joue ${move.player === "north" ? "N" : "S"}${move.pitIndex + 1}, dernière graine en ${lastPosStr}, ${captureDesc}.`;
  newState.lastMoveDesc = desc;
  newState.moveNumber++;
  
  return { ok: true, state: newState, desc: desc };
}

// ==================== RENDU AMÉLIORÉ ====================
let state = createGame("south");
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const CW = 700;
const CH = 380;
canvas.width = CW;
canvas.height = CH;

const PIT_R = 28;
const GREN_W = 55;
const GREN_H = 100;
const GREN_X_LEFT = 28;
const GREN_X_RIGHT = CW - 28;

function getPitCenter(player, index) {
  const startX = GREN_W + 15;
  const endX = CW - GREN_W - 15;
  const cellW = (endX - startX) / 6;
  const x = startX + index * cellW;
  const y = player === "north" ? CH * 0.28 : CH * 0.72;
  return { x, y };
}

// Bois texturé réaliste
function drawWoodTexture() {
  const grad = ctx.createLinearGradient(0, 0, CW, CH);
  grad.addColorStop(0, "#8B5E3C");
  grad.addColorStop(0.3, "#6B3E1C");
  grad.addColorStop(0.7, "#5A3014");
  grad.addColorStop(1, "#3E2010");
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(0, 0, CW, CH, 14);
  ctx.fill();
  
  // Veines du bois
  for (let i = 0; i < 30; i++) {
    ctx.beginPath();
    ctx.moveTo(i * 25, 0);
    ctx.bezierCurveTo(i * 25 + 10, CH * 0.3, i * 25 - 5, CH * 0.6, i * 25 + 5, CH);
    ctx.strokeStyle = `rgba(0,0,0,${0.03 + (i % 3) * 0.01})`;
    ctx.lineWidth = 1.2;
    ctx.stroke();
  }
  
  // Bordure sculptée
  ctx.strokeStyle = "#D4A017";
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.roundRect(3, 3, CW - 6, CH - 6, 12);
  ctx.stroke();
  ctx.strokeStyle = "#A07020";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(1, 1, CW - 2, CH - 2, 14);
  ctx.stroke();
}

function drawCavity(x, y, r, isLegal) {
  ctx.save();
  ctx.shadowColor = "rgba(0,0,0,0.7)";
  ctx.shadowBlur = 6;
  ctx.shadowOffsetY = 3;
  
  const grad = ctx.createRadialGradient(x - 4, y - 4, 3, x, y, r);
  grad.addColorStop(0, "#1A0A02");
  grad.addColorStop(0.6, "#2D1608");
  grad.addColorStop(1, "#4A2810");
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.shadowBlur = 2;
  ctx.beginPath();
  ctx.arc(x, y, r - 2, 0, Math.PI * 2);
  ctx.strokeStyle = "#A08040";
  ctx.lineWidth = 2;
  ctx.stroke();
  
  if (isLegal) {
    ctx.beginPath();
    ctx.arc(x, y, r + 2, 0, Math.PI * 2);
    ctx.strokeStyle = "#FFD700";
    ctx.lineWidth = 2.5;
    ctx.shadowBlur = 12;
    ctx.shadowColor = "#FFD700";
    ctx.stroke();
  }
  ctx.restore();
}

function drawSeed(x, y, isNorth) {
  ctx.save();
  ctx.shadowBlur = 3;
  ctx.shadowOffsetX = 1;
  ctx.shadowOffsetY = 1;
  const grad = ctx.createRadialGradient(x - 2, y - 2, 1, x, y, 5);
  if (isNorth) {
    grad.addColorStop(0, "#E0F0FF");
    grad.addColorStop(1, "#2060A0");
  } else {
    grad.addColorStop(0, "#FFE0C0");
    grad.addColorStop(1, "#C04020");
  }
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.ellipse(x, y, 5, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  // Reflet
  ctx.fillStyle = "rgba(255,255,200,0.6)";
  ctx.beginPath();
  ctx.ellipse(x - 1.5, y - 1.5, 1.5, 1.8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawSeedsInPit(x, y, r, count, isNorth) {
  if (count === 0) return;
  const radius = r * 0.5;
  const maxRing = Math.min(count, 8);
  for (let i = 0; i < maxRing; i++) {
    const angle = (i / maxRing) * Math.PI * 2;
    const offX = Math.cos(angle) * radius;
    const offY = Math.sin(angle) * radius * 0.7;
    drawSeed(x + offX, y + offY - 2, isNorth);
  }
  if (count > 8) {
    for (let i = 0; i < Math.min(count - 8, 4); i++) {
      const angle2 = (i / 3) * Math.PI * 2 + 0.5;
      const offX2 = Math.cos(angle2) * (radius * 0.6);
      const offY2 = Math.sin(angle2) * (radius * 0.5);
      drawSeed(x + offX2, y + offY2 + 1, isNorth);
    }
  }
  // Badge nombre
  ctx.font = "bold 12px 'Cinzel'";
  ctx.fillStyle = "#F5E2A4";
  ctx.shadowBlur = 3;
  ctx.fillText(count, x + 12, y - 12);
}

function drawGrenier(side, score) {
  const cx = side === "sud" ? GREN_X_LEFT : GREN_X_RIGHT;
  const cy = CH / 2;
  const ww = GREN_W;
  const hh = GREN_H;
  
  ctx.save();
  ctx.shadowBlur = 5;
  ctx.fillStyle = "#1A0A02";
  ctx.beginPath();
  ctx.roundRect(cx - ww/2, cy - hh/2, ww, hh, 8);
  ctx.fill();
  
  ctx.fillStyle = "rgba(212,160,23,0.3)";
  ctx.beginPath();
  ctx.roundRect(cx - ww/2 + 2, cy - hh/2 + 2, ww - 4, hh - 4, 6);
  ctx.fill();
  
  ctx.font = "bold 24px 'Cinzel'";
  ctx.fillStyle = side === "sud" ? "#FF6B4A" : "#60AAFF";
  ctx.shadowBlur = 5;
  ctx.fillText(score, cx - 15, cy + 8);
  
  ctx.font = "bold 10px sans-serif";
  ctx.fillStyle = "#D4A017";
  ctx.fillText(side === "sud" ? "SUD" : "NORD", cx - 20, cy - 25);
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, CW, CH);
  drawWoodTexture();
  
  const legalMoves = getLegalMoves(state);
  const legalIndexes = legalMoves.map(m => m.pitIndex);
  
  ["north", "south"].forEach(player => {
    for (let i = 0; i < 7; i++) {
      const { x, y } = getPitCenter(player, i);
      const count = state.board[player][i];
      const isLegal = state.currentPlayer === player && legalIndexes.includes(i);
      drawCavity(x, y, PIT_R, isLegal);
      drawSeedsInPit(x, y, PIT_R, count, player === "north");
    }
  });
  
  drawGrenier("sud", state.scores.south);
  drawGrenier("nord", state.scores.north);
  
  // Motif central décoratif
  ctx.font = "italic 14px 'Cinzel'";
  ctx.fillStyle = "#D4A017";
  ctx.shadowBlur = 2;
  ctx.fillText("⚡ SONGHO ⚡", CW/2 - 55, CH - 12);
}

// ==================== INTERACTIONS ====================
canvas.addEventListener("click", function(e) {
  if (state.status !== "playing") return;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (CW / rect.width);
  const my = (e.clientY - rect.top) * (CH / rect.height);
  const legalMoves = getLegalMoves(state);
  const legalIndexes = legalMoves.map(m => m.pitIndex);
  
  for (let i = 0; i < 7; i++) {
    if (!legalIndexes.includes(i)) continue;
    const { x, y } = getPitCenter(state.currentPlayer, i);
    if (Math.hypot(mx - x, my - y) <= PIT_R + 5) {
      const result = applyMove(state, { player: state.currentPlayer, pitIndex: i });
      if (result.ok) {
        state = result.state;
        document.getElementById("last-move-text").textContent = result.desc;
        const item = document.createElement("div");
        item.className = "history-item";
        item.textContent = (state.moveNumber - 1) + ". " + result.desc;
        const historyList = document.getElementById("history-list");
        historyList.insertBefore(item, historyList.firstChild);
        while (historyList.children.length > 8) historyList.removeChild(historyList.lastChild);
        updateUI();
        draw();
        if (state.status === "ended") {
          document.getElementById("overlay").classList.add("show");
          document.getElementById("modal-title").textContent = state.winner === "draw" ? "Match nul !" : (state.winner === "north" ? "Nord" : "Sud") + " gagne !";
          document.getElementById("modal-body").textContent = `Score final : Nord ${state.scores.north} – Sud ${state.scores.south}`;
        }
      }
      break;
    }
  }
});

function updateUI() {
  document.getElementById("score-nord").textContent = state.scores.north;
  document.getElementById("score-sud").textContent = state.scores.south;
  document.getElementById("move-counter").textContent = "Tour " + state.moveNumber;
  document.getElementById("tour-joueur").textContent = state.currentPlayer === "north" ? "Nord" : "Sud";
  document.getElementById("etat-jeu").textContent = state.status === "playing" ? "En jeu" : "Terminée";
}

document.getElementById("btn-restart").addEventListener("click", () => {
  state = createGame("south");
  document.getElementById("history-list").innerHTML = "";
  document.getElementById("last-move-text").textContent = "—";
  document.getElementById("overlay").classList.remove("show");
  updateUI();
  draw();
});

// Helper pour roundRect
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (w < 2 * r) r = w / 2;
    if (h < 2 * r) r = h / 2;
    this.moveTo(x+r, y);
    this.lineTo(x+w-r, y);
    this.quadraticCurveTo(x+w, y, x+w, y+r);
    this.lineTo(x+w, y+h-r);
    this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    this.lineTo(x+r, y+h);
    this.quadraticCurveTo(x, y+h, x, y+h-r);
    this.lineTo(x, y+r);
    this.quadraticCurveTo(x, y, x+r, y);
    return this;
  };
}

updateUI();
draw();
</script>
</body>
</html>
